name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run build

      - uses: actions/upload-artifact@v4
        with:
          name: subscribe.user.js
          path: dist/userscript.js
          retention-days: 90
